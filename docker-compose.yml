---
services:
  b-ui:
    image: ghcr.io/beanya/b-ui:latest
    container_name: b-ui
    hostname: "b-ui"
    volumes:
      - "./db:/app/db"
      - "./cert:/app/cert"
    tty: true
    restart: unless-stopped
    ports:
      - "2095:2095"
      - "2096:2096"
    networks:
      - b-ui
    entrypoint: "./entrypoint.sh"

networks:
  b-ui:
    driver: bridge
  
