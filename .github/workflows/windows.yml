name: Build B-UI for Windows

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

env:
  NODE_VERSION: "25"
  TAGS: "with_quic,with_grpc,with_utls,with_acme,with_gvisor,with_naive_outbound,with_purego,badlinkname,tfogo_checklinkname0,with_tailscale"
  LIBCRONET_BASE_URL: "https://github.com/SagerNet/cronet-go/releases/latest/download"

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'
          cache-dependency-path: src/frontend/package-lock.json

      - name: Build frontend
        run: bash ./scripts/build/build-frontend.sh

      - name: Upload embedded web assets
        uses: actions/upload-artifact@v7
        with:
          name: web-html
          path: src/backend/internal/infra/web/html
          retention-days: 1

  build-windows:
    needs: build-frontend
    name: build-windows-${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { arch: amd64, runner: windows-latest, cgo: "1" }
          - { arch: arm64, runner: ubuntu-latest, cgo: "0" }
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Refresh embedded web assets
        shell: bash
        run: |
          rm -rf src/backend/internal/infra/web/html
          mkdir -p src/backend/internal/infra/web/html

      - name: Download embedded web assets
        uses: actions/download-artifact@v8
        with:
          name: web-html
          path: src/backend/internal/infra/web/html

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          cache: false
          go-version-file: go.mod

      - name: Install zip for Windows
        if: matrix.arch == 'amd64'
        shell: powershell
        run: |
          # Install Chocolatey if not available
          if (!(Get-Command choco -ErrorAction SilentlyContinue)) {
            Set-ExecutionPolicy Bypass -Scope Process -Force
            [System.Net.ServicePointManager]::SecurityProtocol = [System.Net.ServicePointManager]::SecurityProtocol -bor 3072
            iex ((New-Object System.Net.WebClient).DownloadString('https://community.chocolatey.org/install.ps1'))
          }
          # Install zip
          choco install zip -y

      - name: Build b-ui
        shell: bash
        run: |
          export CGO_ENABLED=${{ matrix.cgo }}
          export GOOS=windows
          export GOARCH=${{ matrix.arch }}
          
          echo "Building for Windows ${{ matrix.arch }}"
          go version
          go env GOOS GOARCH
          
          VERSION_LDFLAGS=""
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then VERSION_LDFLAGS="-X github.com/BeanYa/b-ui/src/backend/internal/domain/config.buildVersion=${GITHUB_REF_NAME}"; fi
          go build -ldflags="-w -s -checklinkname=0 ${VERSION_LDFLAGS}" -tags "${{ env.TAGS }}" -o b-ui.exe ./src/backend/cmd/b-ui
          file b-ui.exe
          
          mkdir b-ui-windows
          cp b-ui.exe b-ui-windows/
          cp src/services/windows/b-ui-windows.xml b-ui-windows/
          cp src/services/windows/b-ui-windows.bat b-ui-windows/
          cp src/services/windows/install-windows.bat b-ui-windows/
          cp src/services/windows/uninstall-windows.bat b-ui-windows/

      - name: Download libcronet-go
        shell: bash
        run: |
          curl -qsL -o b-ui-windows/libcronet.dll ${{ env.LIBCRONET_BASE_URL }}/libcronet-windows-${{ matrix.arch }}.dll

      - name: Package
        shell: bash
        run: |
          zip -r "b-ui-windows-${{ matrix.arch }}.zip" b-ui-windows

      - name: Upload files to Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: b-ui-windows-${{ matrix.arch }}
          path: ./b-ui-windows-${{ matrix.arch }}.zip
          retention-days: 30

      - name: Upload to Release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ github.ref_name }}
          file: b-ui-windows-${{ matrix.arch }}.zip
          asset_name: b-ui-windows-${{ matrix.arch }}.zip
          prerelease: false
          overwrite: true
